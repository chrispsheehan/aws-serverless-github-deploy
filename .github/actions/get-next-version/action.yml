name: "Get Next Version"
description: "Compute the next semver tag from commit subject prefixes since the latest semver tag"

inputs:
  major_prefixes:
    description: "Comma-separated commit subject prefixes that trigger a major bump"
    required: false
    default: "breaking,major"
  minor_prefixes:
    description: "Comma-separated commit subject prefixes that trigger a minor bump"
    required: false
    default: "feat,minor"
  patch_prefixes:
    description: "Comma-separated commit subject prefixes that trigger a patch bump"
    required: false
    default: "fix,chore"

outputs:
  version:
    description: "Next semver version when a matching commit exists, otherwise the current tag"
  hasNextVersion:
    description: "Whether any commit since the latest semver tag matched the configured prefixes"
  currentVersion:
    description: "Latest semver tag discovered on the current branch, or 0.0.0 if none exists"
  bump:
    description: "Resolved bump level: major, minor, patch, or empty when no matching commit exists"

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - --major-prefixes
    - ${{ inputs.major_prefixes }}
    - --minor-prefixes
    - ${{ inputs.minor_prefixes }}
    - --patch-prefixes
    - ${{ inputs.patch_prefixes }}
