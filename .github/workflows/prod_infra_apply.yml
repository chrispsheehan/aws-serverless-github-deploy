name: Prod Infra Apply (no plan)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  get_build:
    name: Resolve
    uses: ./.github/workflows/shared_build_get.yml
    with:
      environment: ci
      lambda_version: 0.19.13
      frontend_version: 0.19.13
      ecs_version: 0.19.13

  infra:
    name: Apply
    needs:
      - get_build
    uses: ./.github/workflows/shared_infra_apply.yml
    with:
      environment: prod
      infra_version: 0.19.13
      code_bucket: ${{ needs.get_build.outputs.code_bucket }}
      lambda_matrix: ${{ needs.get_build.outputs.lambda_version_files }}
      bootstrap_image_uri: ${{ needs.get_build.outputs.bootstrap_image_uri }}
      service_matrix: ${{ needs.get_build.outputs.ecs_service_matrix }}
