on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      lambda_version:
        required: true
        type: string
      frontend_version:
        required: true
        type: string
      ecs_version:
        required: true
        type: string
      lambda_matrix:
        required: false
        type: string
        default: "[]"
      ecs_matrix:
        required: false
        type: string
        default: "[]"

concurrency: # only run one instance of workflow at any one time
  group: build-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  VERSION: ${{ inputs.lambda_version }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/aws-serverless-github-deploy-${{ inputs.environment }}-github-oidc-role

jobs:
  bucket:
    runs-on: ubuntu-latest
    outputs:
      code_bucket_name: ${{ steps.get_bucket_name.outputs.bucket }}
    steps:
      - uses: actions/checkout@v6

      - name: Get build artifact bucket
        id: deploy_bucket
        uses: chrispsheehan/terragrunt-aws-oidc-action@0.4.1
        with:
          aws_oidc_role_arn: ${{ env.AWS_OIDC_ROLE_ARN }}
          tg_directory: infra/live/${{ inputs.environment }}/aws/code_bucket
          tg_action: init

      - name: Get bucket name
        id: get_bucket_name
        env:
          TG_OUTPUTS: ${{ steps.deploy_bucket.outputs.tg_outputs  }}
        run: |
          echo "bucket=$(echo $TG_OUTPUTS | jq -r '.bucket.value')" >> $GITHUB_OUTPUT

  frontend:
    needs: bucket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build frontend
        uses: chrispsheehan/just-aws-oidc-action@0.3.0
        with:
          just_action: frontend-build

      - name: Upload frontend
        uses: chrispsheehan/just-aws-oidc-action@0.3.0
        env:
          BUCKET_NAME: ${{ needs.bucket.outputs.code_bucket_name }}
          VERSION: ${{ inputs.frontend_version != '' && inputs.frontend_version || inputs.lambda_version }}
        with:
          aws_oidc_role_arn: ${{ env.AWS_OIDC_ROLE_ARN }}
          just_action: frontend-upload

  ecr:
    runs-on: ubuntu-latest
    outputs:
      repository_url: ${{ steps.get_repository_url.outputs.repository_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Get ECR infra
        id: get-ecr
        uses: chrispsheehan/terragrunt-aws-oidc-action@0.4.1
        with:
          aws_oidc_role_arn: ${{ env.AWS_OIDC_ROLE_ARN }}
          tg_directory: infra/live/ci/aws/ecr
          tg_action: init

      - name: Get ECR repository url
        id: get_repository_url
        env:
          TG_OUTPUTS: ${{ steps.get-ecr.outputs.tg_outputs }}
        run: |
          echo "repository_url=$(echo $TG_OUTPUTS | jq -r '.repository_url.value')" >> $GITHUB_OUTPUT

  ecs:
    needs: ecr
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        value: ${{ fromJson(inputs.ecs_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-west-2

      - name: "Build ${{ matrix.value }} ECS image"
        uses: chrispsheehan/just-aws-oidc-action@0.3.0
        env:
          ECS_NAME: ${{ matrix.value }}
          IMAGE_URI: ${{ needs.ecr.outputs.repository_url }}:${{ matrix.value }}-${{ inputs.ecs_version }}
        with:
          just_action: docker-build

      - name: "Push ${{ matrix.value }} ECS image"
        uses: chrispsheehan/just-aws-oidc-action@0.3.0
        env:
          IMAGE_URI: ${{ needs.ecr.outputs.repository_url }}:${{ matrix.value }}-${{ inputs.ecs_version != '' && inputs.ecs_version || inputs.lambda_version }}
        with:
          aws_oidc_role_arn: ${{ env.AWS_OIDC_ROLE_ARN }}
          just_action: docker-push

  lambdas:
    needs: bucket
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        value: ${{ fromJson(inputs.lambda_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: "Build ${{ matrix.value }} Lambda"
        uses: chrispsheehan/just-aws-oidc-action@0.3.0
        env:
          LAMBDA_NAME: ${{ matrix.value }}
        with:
          just_action: lambda-build

      - name: "Upload ${{ matrix.value }} Lambda"
        uses: chrispsheehan/just-aws-oidc-action@0.3.0
        env:
          LAMBDA_NAME: ${{ matrix.value }}
          BUCKET_NAME: ${{ needs.bucket.outputs.code_bucket_name }}
          VERSION: ${{ inputs.lambda_version }}
        with:
          aws_oidc_role_arn: ${{ env.AWS_OIDC_ROLE_ARN }}
          just_action: lambda-upload
