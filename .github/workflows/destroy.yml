name: Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      allow_prod_cleanup:
        description: "Also run prod-only cleanup and destroy jobs that are normally skipped for prod"
        required: true
        type: boolean
        default: false

concurrency: # only run destroy when no other deploy/destroy is running for the same environment
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  TF_VAR_lambda_version: this
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}
  DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}

jobs:
  setup:
    name: Discover
    uses: ./.github/workflows/shared_directories_get.yml

  observability:
    name: Observability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy observability infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/observability
          tg_action: destroy

  lambdas:
    name: Lambdas
    runs-on: ubuntu-latest
    needs:
      - setup
      - services
    strategy:
      fail-fast: false
      matrix:
        value: ${{ fromJson(needs.setup.outputs.lambda_dirs) }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ${{ matrix.value }} infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.value }}
          tg_action: destroy

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy frontend infra
        uses: ./.github/actions/terragrunt
        env:
          TF_VAR_api_invoke_url: "https://placeholder.execute-api.us-east-1.amazonaws.com"
          TF_VAR_domain_name: ${{ env.DOMAIN_NAME }}
          TF_VAR_auth_user_pool_id: "destroy-placeholder"
          TF_VAR_auth_user_pool_client_id: "destroy-placeholder"
          TF_VAR_auth_hosted_ui_url: "https://destroy-placeholder"
          TF_VAR_auth_readonly_group_name: "readonly"
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/frontend
          tg_action: destroy

  cognito:
    name: Cognito
    runs-on: ubuntu-latest
    needs:
      - frontend
      - network
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy cognito infra
        uses: ./.github/actions/terragrunt
        env:
          TF_VAR_domain_name: ${{ env.DOMAIN_NAME }}
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/cognito
          tg_action: destroy

  services:
    name: Services
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        value: ${{ fromJson(needs.setup.outputs.ecs_service_dirs) }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy ${{ matrix.value }} infra
        uses: ./.github/actions/terragrunt
        env:
          TF_VAR_bootstrap: "true"
          TF_VAR_bootstrap_image_uri: "destroy-placeholder"
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.value }}
          tg_action: destroy

  tasks:
    name: Tasks
    runs-on: ubuntu-latest
    needs:
      - setup
      - services
    strategy:
      fail-fast: false
      matrix:
        value: ${{ fromJson(needs.setup.outputs.task_dirs) }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy ${{ matrix.value }} infra
        uses: ./.github/actions/terragrunt
        env:
          TF_VAR_image_uri: "destroy-placeholder"
          TF_VAR_debug_image_uri: "destroy-placeholder"
          TF_VAR_aws_otel_collector_image_uri: "destroy-placeholder"
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.value }}
          tg_action: destroy

  worker-messaging:
    name: Worker Messaging
    runs-on: ubuntu-latest
    needs:
      - lambdas
      - services
      - tasks
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy worker messaging infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/worker_messaging
          tg_action: destroy

  database:
    name: Database
    runs-on: ubuntu-latest
    needs:
      - lambdas
      - services
      - tasks
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy database infra
        uses: ./.github/actions/terragrunt
        env:
          TF_VAR_database_security_group_id: "destroy-placeholder"
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/database
          tg_action: destroy

  network:
    name: Network
    needs:
      - frontend
      - services
      - tasks
      - database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy network infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/network
          tg_action: destroy

  security:
    name: Security
    needs:
      - network
      - lambdas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy security infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/security
          tg_action: destroy

  build-bucket:
    name: Code Bucket
    if: inputs.environment != 'prod' || inputs.allow_prod_cleanup
    needs:
      - lambdas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy code
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/code_bucket
          tg_action: destroy

  ecr:
    name: ECR
    if: inputs.environment != 'prod' || inputs.allow_prod_cleanup
    needs:
      - network
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy code
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/ecr
          tg_action: destroy

  cluster:
    name: Cluster
    needs:
      - services
      - tasks
      - database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy cluster infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/cluster
          tg_action: destroy

  cleanup:
    name: Cleanup
    if: inputs.environment != 'prod' || inputs.allow_prod_cleanup
    needs:
      - observability
      - cognito
      - security
      - build-bucket
      - ecr
      - cluster
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Warn before prod tagged cleanup
        if: inputs.environment == 'prod'
        run: |
          printf '\033[1;31m%s\033[0m\n' 'WARNING: running retained tagged-resource cleanup for prod.'
          printf '%s\n' 'This may delete leaked Cognito user pools and deregister tagged ECS task-definition revisions.'

      - name: Count tagged resources
        id: count-tagged
        uses: ./.github/actions/just
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          ALLOW_PROD_CLEANUP: ${{ inputs.allow_prod_cleanup }}
        with:
          justfile_path: justfile.destroy
          just_action: count-tagged-resources

      - name: Warn when tagged resources remain
        if: steps.count-tagged.outputs.just_outputs != '0'
        run: |
          printf '\033[1;33m%s\033[0m\n' "WARNING: found ${{ steps.count-tagged.outputs.just_outputs }} tagged resources after destroy."

      - name: Cleanup tagged resources
        if: steps.count-tagged.outputs.just_outputs != '0'
        uses: ./.github/actions/just
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          ALLOW_PROD_CLEANUP: ${{ inputs.allow_prod_cleanup }}
        with:
          justfile_path: justfile.destroy
          just_action: cleanup-tagged-resources
