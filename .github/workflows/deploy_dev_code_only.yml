name: Dev Deploy Code Only
# This allows us to deploy only code changes to dev without touching infra.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      lambdas_dirs: ${{ steps.lambdas_dirs.outputs.just_outputs }}
      container_dirs: ${{ steps.container_dirs.outputs.just_outputs }}
    steps:
      - uses: actions/checkout@v6

      - name: Get lambdas Directories
        id: lambdas_dirs
        uses: chrispsheehan/just-aws-oidc-action@0.3.0
        with:
          just_action: lambda-get-directories

      - name: Get container Directories
        id: container_dirs
        uses: chrispsheehan/just-aws-oidc-action@0.3.0
        with:
          just_action: container-get-directories

  build:
    uses: ./.github/workflows/build.yml
    needs:
      - setup
    with:
      environment: dev
      lambda_version: ${{ github.sha }}
      frontend_version: ${{ github.sha }}
      ecs_version: ${{ github.sha }}
      lambda_matrix: ${{ needs.setup.outputs.lambdas_dirs }}
      ecs_matrix: ${{ needs.setup.outputs.container_dirs }}


  get_build:
    needs: build
    uses: ./.github/workflows/build_get.yml
    with:
      environment: dev
      lambda_version: ${{ needs.build.outputs.lambda_version }}
      frontend_version: ${{ needs.build.outputs.frontend_version }}
      ecs_version: ${{ needs.build.outputs.ecs_version }}

  deploy:
    uses: ./.github/workflows/deploy.yml
    needs:
      - setup
      - build
      - get_build
    with:
      environment: dev
      lambda_version: ${{ needs.build.outputs.lambda_version }}
      frontend_version: ${{ needs.build.outputs.frontend_version }}
      code_bucket: ${{ needs.get_build.outputs.code_bucket }}
      lambda_matrix: ${{ needs.setup.outputs.lambdas_dirs }}
      task_matrix: ${{ needs.get_build.outputs.ecs_task_matrix }}
      ecs_image_uris: ${{ needs.get_build.outputs.ecs_image_uris }}
