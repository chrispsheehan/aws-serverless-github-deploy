name: Shared Infra Plan

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      infra_version:
        description: "Version of infrastructure (terraform) to be planned"
        required: true
        type: string
      code_bucket:
        description: "Bucket containing build artifacts"
        required: true
        type: string
      bootstrap_image_uri:
        description: "Bootstrap ECS image URI"
        required: false
        type: string
        default: ""
      lambda_matrix:
        required: false
        type: string
        default: "[]"
      service_matrix:
        required: false
        type: string
        default: "[]"
    outputs:
      plan_artifact_run_id:
        description: "Workflow run ID for the saved plan artifacts and metadata"
        value: ${{ jobs.plan_context.outputs.plan_artifact_run_id }}

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      plan_artifact_s3_prefix: ${{ steps.plan_artifact_s3_prefix.outputs.just_outputs }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.infra_version }}

      - name: Get plan artifact S3 prefix
        id: plan_artifact_s3_prefix
        uses: ./.github/actions/just
        env:
          BUCKET_NAME: ${{ inputs.code_bucket }}
          ENVIRONMENT: ${{ inputs.environment }}
          RUN_ID: ${{ github.run_id }}
        with:
          justfile_path: justfile.tg
          just_action: terragrunt-plan-base-s3-prefix

      - name: Write plan metadata from workflow inputs
        shell: bash
        run: |
          cat > plan-metadata.json <<EOF
          {
            "infra_version": "${{ inputs.infra_version }}",
            "code_bucket": "${{ inputs.code_bucket }}",
            "lambda_matrix": ${{ inputs.lambda_matrix }},
            "bootstrap_image_uri": "${{ inputs.bootstrap_image_uri }}",
            "service_matrix": ${{ inputs.service_matrix }}
          }
          EOF

      - name: Upload plan metadata to S3
        uses: ./.github/actions/just
        env:
          PLAN_ARTIFACT_S3_PREFIX: ${{ steps.plan_artifact_s3_prefix.outputs.just_outputs }}
        with:
          aws_oidc_role_arn: ${{ env.AWS_OIDC_ROLE_ARN }}
          justfile_path: justfile.ci
          just_action: infra-plan-metadata-upload

  infra:
    needs:
      - metadata
    uses: ./.github/workflows/shared_infra.yml
    with:
      environment: ${{ inputs.environment }}
      infra_version: ${{ inputs.infra_version }}
      code_bucket: ${{ inputs.code_bucket }}
      lambda_matrix: ${{ inputs.lambda_matrix }}
      bootstrap_image_uri: ${{ inputs.bootstrap_image_uri }}
      service_matrix: ${{ inputs.service_matrix }}
      tg_action: plan
      plan_artifact_s3_prefix: ${{ needs.metadata.outputs.plan_artifact_s3_prefix }}

  plan_context:
    name: Plan Context
    runs-on: ubuntu-latest
    outputs:
      plan_artifact_run_id: ${{ steps.emit.outputs.plan_artifact_run_id }}
    steps:
      - name: Print plan artifact run id
        id: emit
        env:
          PLAN_ARTIFACT_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          echo "plan_artifact_run_id=$PLAN_ARTIFACT_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "plan_artifact_run_id=$PLAN_ARTIFACT_RUN_ID"
          {
            echo "## Infra Plan Context"
            echo
            echo "- \`plan_artifact_run_id\`: \`$PLAN_ARTIFACT_RUN_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"
