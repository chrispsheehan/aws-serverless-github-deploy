name: PR

on:
  pull_request:
    types:
      [
        opened,
        reopened,
        synchronize,
        review_requested,
        ready_for_review,
        edited,
      ]

jobs:
  check-pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      ALLOWED_PREFIXES: "breaking: major: feat: minor: fix: chore: docs:"
    steps:
      - name: Fail if PR title does not start with an allowed prefix
        run: |
          echo "PR title: $PR_TITLE"
          for prefix in $ALLOWED_PREFIXES; do
            if [[ "$PR_TITLE" == "$prefix"* ]]; then
              echo "✅ PR title is valid."
              exit 0
            fi
          done
          echo "::error::❌ PR title must start with one of: $ALLOWED_PREFIXES"
          exit 1

  check:
    name: Changes
    needs: check-pr-title
    permissions:
      pull-requests: read
      contents: read
    uses: ./.github/workflows/get_changes.yml
    with:
      ref: ${{ github.sha }}
    secrets: inherit

  test-next-version-action:
    name: Next Version Action
    needs: check-pr-title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Execute repo-local get-next-version action
        id: get_next_version
        uses: ./.github/actions/get-next-version
        with:
          major_prefixes: breaking,major
          minor_prefixes: feat,minor
          patch_prefixes: fix,chore,docs

      - name: Show action outputs
        run: |
          echo "currentVersion=${{ steps.get_next_version.outputs.currentVersion }}"
          echo "version=${{ steps.get_next_version.outputs.version }}"
          echo "hasNextVersion=${{ steps.get_next_version.outputs.hasNextVersion }}"
          echo "bump=${{ steps.get_next_version.outputs.bump }}"

  format-github:
    needs: check
    runs-on: ubuntu-latest
    if: ${{ needs.check.outputs.github == 'true' }}
    name: GH Fmt
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2
        with:
          shellcheck: false
          pyflakes: false

  format-terragrunt:
    needs: check
    runs-on: ubuntu-latest
    if: ${{ needs.check.outputs.terraform == 'true' || needs.check.outputs.terragrunt == 'true' }}
    name: TG Fmt
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
      - uses: autero1/action-terragrunt@v3.0.2
        with:
          terragrunt-version: 0.45.10

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra

      - name: Terragrunt hclfmt check
        run: terragrunt hclfmt --terragrunt-check
        working-directory: infra

  lint-terraform:
    needs: check
    runs-on: ubuntu-latest
    if: ${{ needs.check.outputs.terraform == 'true' }}
    name: TF Lint
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: tflint --init

      - name: "Run terraform lint checks"
        uses: ./.github/actions/just
        with:
          just_action: tf-lint-check

  check-lambda-naming:
    needs: check
    runs-on: ubuntu-latest
    name: Lambda Names
    steps:
      - uses: actions/checkout@v6
      - name: Fail if any lambda directory uses hyphens
        run: |
          bad_dirs=$(find lambdas -mindepth 1 -maxdepth 1 -type d -name '*-*')
          if [ -n "$bad_dirs" ]; then
            echo "::error::❌ Lambda directories must use underscores, not hyphens: $bad_dirs"
            exit 1
          fi
          echo "✅ All lambda directories use underscores."

  check-ecs-module-pairs:
    needs: check
    runs-on: ubuntu-latest
    name: ECS Pairs
    steps:
      - uses: actions/checkout@v6

      - name: Fail if task_/service_ pairs are incomplete
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          while IFS= read -r env_dir; do
            env_name="$(basename "$env_dir")"
            aws_dir="$env_dir/aws"

            [ -d "$aws_dir" ] || continue

            while IFS= read -r service_dir; do
              service_name="$(basename "$service_dir")"
              suffix="${service_name#service_}"
              task_dir="$aws_dir/task_$suffix"

              if [ ! -d "$task_dir" ]; then
                echo "::error::❌ Missing task_$suffix for $service_name in $aws_dir"
                missing=1
              fi
            done < <(find "$aws_dir" -mindepth 1 -maxdepth 1 -type d -name 'service_*' | sort)

            while IFS= read -r task_dir; do
              task_name="$(basename "$task_dir")"
              suffix="${task_name#task_}"
              service_dir="$aws_dir/service_$suffix"

              if [ ! -d "$service_dir" ]; then
                echo "::error::❌ Missing service_$suffix for $task_name in $aws_dir"
                missing=1
              fi
            done < <(find "$aws_dir" -mindepth 1 -maxdepth 1 -type d -name 'task_*' | sort)
          done < <(find infra/live -mindepth 1 -maxdepth 1 -type d | sort)

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "✅ All ECS task_/service_ pairs are present."

  setup:
    name: Discover
    if: ${{ needs.check.outputs.lambdas == 'true' || needs.check.outputs.containers == 'true' }}
    needs: check
    uses: ./.github/workflows/get_directories.yml

  build-lambdas:
    name: Build Lambdas
    if: ${{ needs.check.outputs.lambdas == 'true' }}
    needs:
      - check
      - setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        value: ${{ fromJson(needs.setup.outputs.lambda_dirs) }}
    steps:
      - uses: actions/checkout@v6

      - name: "Build ${{ matrix.value }} Lambda"
        uses: ./.github/actions/just
        env:
          LAMBDA_NAME: ${{ matrix.value }}
        with:
          just_action: lambda-build

  build-containers:
    name: Build Containers
    if: ${{ needs.check.outputs.containers == 'true' }}
    needs:
      - check
      - check-ecs-module-pairs
      - setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        value: ${{ fromJson(needs.setup.outputs.container_dirs) }}
    steps:
      - uses: actions/checkout@v6

      - name: "Build ${{ matrix.value }} ECS image"
        uses: ./.github/actions/just
        env:
          CONTAINER_NAME: ${{ matrix.value }}
        with:
          just_action: docker-build

  build-frontend:
    if: ${{ needs.check.outputs.frontend == 'true' }}
    needs: 
      - check
    runs-on: ubuntu-latest
    name: Build Frontend
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: "Build"
        uses: ./.github/actions/just
        with:
          just_action: frontend-build
