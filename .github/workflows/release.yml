name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  issues: write

jobs:
  get-current-tag:
    name: Current Tag
    runs-on: ubuntu-latest
    outputs:
      current_tag: ${{ steps.get_tag.outputs.CURRENT_TAG }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get current tag
        id: get_tag
        run: |
          CURRENT_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          echo "CURRENT_TAG=${CURRENT_TAG}" >> $GITHUB_OUTPUT

  get-next-tag:
    name: Next Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_next_version.outputs.version }}
      has-next-version: ${{ steps.get_next_version.outputs.hasNextVersion }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Only commits with types like fix:, feat:, or breaking changes (feat!: or commits including a BREAKING CHANGE note) will cause the version to increment.
      - name: Get next version
        id: get_next_version
        uses: ./.github/actions/get-next-version

      - name: Show the next version
        run: |
          echo ${{ steps.get_next_version.outputs.version }}
          echo ${{ steps.get_next_version.outputs.hasNextVersion }}

  create-tag:
    name: Tag
    needs: get-next-tag
    if: ${{ needs.get-next-tag.outputs.has-next-version == 'true' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.get-next-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Create new tag
        run: |
          echo "Tagging $TAG"
          git tag "$TAG"
          git push origin --tag "$TAG"

  get-commits:
    name: Commits
    needs:
      - get-next-tag
      - create-tag
      - get-current-tag
    if: ${{ needs.get-next-tag.outputs.has-next-version == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.commits.outputs.COMMITS }}
    env:
      TAG: ${{ needs.get-next-tag.outputs.tag }}
      CURRENT_TAG: ${{ needs.get-current-tag.outputs.current_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get commit messages
        id: commits
        run: |
          COMMITS=$(git log ${CURRENT_TAG}..${TAG} --pretty=format:"* %s")
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  get-apps:
    name: Discover
    uses: ./.github/workflows/shared_directories_get.yml


  build:
    name: Build
    needs:
      - create-tag
      - get-next-tag
      - get-apps
      - code
    uses: ./.github/workflows/shared_build.yml
    permissions:
      id-token: write
      contents: write
    with:
      environment: ci
      lambda_version: ${{ needs.get-next-tag.outputs.tag }}
      frontend_version: ${{ needs.get-next-tag.outputs.tag }}
      ecs_version: ${{ needs.get-next-tag.outputs.tag }}
      lambda_matrix: ${{ needs.get-apps.outputs.lambda_dirs }}
      ecs_matrix: ${{ needs.get-apps.outputs.container_dirs }}

  code:
    name: Artifacts
    needs:
      - create-tag
      - get-next-tag
    uses: ./.github/workflows/shared_infra_releases.yml
    permissions:
      id-token: write
      contents: write
    with:
      environment: ci
      infra_version: ${{ needs.get-next-tag.outputs.tag }}

  release:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - get-next-tag
      - create-tag
      - get-commits
      - build
    if: ${{ needs.get-next-tag.outputs.has-next-version == 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-next-tag.outputs.tag }}
          body: |
            Release Notes:
            ${{ needs.get-commits.outputs.commits }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
