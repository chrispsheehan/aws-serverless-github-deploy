name: Shared Infra Apply

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      infra_version:
        description: "Version of infrastructure (terraform) to be applied"
        required: true
        type: string
      code_bucket:
        description: "Bucket containing build artifacts"
        required: true
        type: string
      bootstrap_image_uri:
        description: "Bootstrap ECS image URI"
        required: false
        type: string
        default: ""
      lambda_matrix:
        required: false
        type: string
        default: "[]"
      service_matrix:
        required: false
        type: string
        default: "[]"

jobs:
  infra:
    uses: ./.github/workflows/shared_infra.yml
    with:
      environment: ${{ inputs.environment }}
      infra_version: ${{ inputs.infra_version }}
      code_bucket: ${{ inputs.code_bucket }}
      lambda_matrix: ${{ inputs.lambda_matrix }}
      bootstrap_image_uri: ${{ inputs.bootstrap_image_uri }}
      service_matrix: ${{ inputs.service_matrix }}
      tg_action: apply
